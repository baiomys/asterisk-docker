name: Build and push

on:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - .github/workflows/build_and_push.yml
    tags:
      - "*"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/asterisk-dongle:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/asterisk-dongle:cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/asterisk-dongle:cache,mode=max
